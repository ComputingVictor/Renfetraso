<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 Test de Conexión - Renfe APIs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        select, button {
            padding: 12px 24px;
            border-radius: 8px;
            border: 2px solid #667eea;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
        }

        select {
            flex: 1;
            min-width: 200px;
            background: white;
        }

        button {
            background: #667eea;
            color: white;
            font-weight: 600;
        }

        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .test-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 5px solid #ddd;
            transition: all 0.3s;
        }

        .test-card.testing {
            border-left-color: #f39c12;
            background: #fff9e6;
        }

        .test-card.success {
            border-left-color: #2ecc71;
            background: #e8f8f5;
        }

        .test-card.error {
            border-left-color: #e74c3c;
            background: #fdf0ef;
        }

        .test-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .test-title {
            font-weight: 600;
            font-size: 1.1em;
        }

        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .status-pending {
            background: #ecf0f1;
            color: #7f8c8d;
        }

        .status-testing {
            background: #f39c12;
            color: white;
            animation: pulse 1.5s infinite;
        }

        .status-success {
            background: #2ecc71;
            color: white;
        }

        .status-error {
            background: #e74c3c;
            color: white;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .test-url {
            font-family: monospace;
            font-size: 0.85em;
            color: #666;
            background: white;
            padding: 8px;
            border-radius: 5px;
            margin: 10px 0;
            word-break: break-all;
        }

        .test-result {
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.9em;
        }

        .result-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .result-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .summary {
            margin-top: 30px;
            padding: 20px;
            background: #e8f4fd;
            border-radius: 12px;
            border-left: 5px solid #3498db;
        }

        .summary h3 {
            color: #2980b9;
            margin-bottom: 10px;
        }

        .summary-item {
            padding: 5px 0;
            font-size: 0.95em;
        }

        code {
            background: #2c3e50;
            color: #ecf0f1;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Test de Conexión CORS</h1>
        <p class="subtitle">Prueba qué proxy CORS funciona mejor con las APIs de Renfe</p>

        <div class="controls">
            <select id="proxySelect">
                <option value="https://corsproxy.io/?">CorsProxy.io (Recomendado - Más rápido)</option>
                <option value="https://api.allorigins.win/raw?url=">AllOrigins (Más estable)</option>
                <option value="https://api.codetabs.com/v1/proxy?quest=">CodeTabs (Alternativa)</option>
                <option value="">Sin proxy (prueba directa)</option>
            </select>
            <button onclick="testSingleProxy()">Probar Seleccionado</button>
            <button onclick="testAllProxies()" style="background: #2ecc71;">Probar Todos</button>
        </div>

        <div id="results"></div>

        <div id="summary" style="display: none;" class="summary">
            <h3>📊 Resumen de Resultados</h3>
            <div id="summaryContent"></div>
        </div>
    </div>

    <script>
        const PROXIES = [
            { name: 'CorsProxy.io (Recomendado)', url: 'https://corsproxy.io/?' },
            { name: 'AllOrigins', url: 'https://api.allorigins.win/raw?url=' },
            { name: 'CodeTabs', url: 'https://api.codetabs.com/v1/proxy?quest=' },
            { name: 'Sin proxy', url: '' }
        ];

        const TEST_APIS = [
            { name: 'Fleet Data (flotaLD.json)', url: 'https://tiempo-real.largorecorrido.renfe.com/renfe-visor/flotaLD.json' },
            { name: 'Routes Data (trenesConEstacionesLD.json)', url: 'https://tiempo-real.largorecorrido.renfe.com/renfe-visor/trenesConEstacionesLD.json' }
            // Nota: estaciones.geojson ahora se sirve como archivo local (./estaciones.geojson)
        ];

        let testResults = [];

        async function testProxy(proxyUrl, apiUrl, cardElement) {
            const startTime = Date.now();

            try {
                const urlWithCache = apiUrl + (apiUrl.includes('?') ? '&' : '?') + 'v=' + Date.now();
                const fullUrl = proxyUrl ? proxyUrl + encodeURIComponent(urlWithCache) : urlWithCache;

                const response = await fetch(fullUrl, {
                    signal: AbortSignal.timeout(20000) // 20 segundos de timeout
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                const duration = Date.now() - startTime;

                cardElement.className = 'test-card success';
                cardElement.querySelector('.status-badge').textContent = '✅ Éxito';
                cardElement.querySelector('.status-badge').className = 'status-badge status-success';

                const resultDiv = document.createElement('div');
                resultDiv.className = 'test-result result-success';
                resultDiv.innerHTML = `
                    <strong>✅ Conexión exitosa</strong><br>
                    ⏱️ Tiempo de respuesta: <strong>${duration}ms</strong><br>
                    📦 Datos recibidos: ${Array.isArray(data) ? data.length : Object.keys(data).length} elementos
                `;
                cardElement.appendChild(resultDiv);

                return { success: true, duration, error: null };

            } catch (error) {
                const duration = Date.now() - startTime;

                cardElement.className = 'test-card error';
                cardElement.querySelector('.status-badge').textContent = '❌ Error';
                cardElement.querySelector('.status-badge').className = 'status-badge status-error';

                const resultDiv = document.createElement('div');
                resultDiv.className = 'test-result result-error';
                resultDiv.innerHTML = `
                    <strong>❌ Error:</strong> ${error.message}<br>
                    ⏱️ Tiempo transcurrido: ${duration}ms
                `;
                cardElement.appendChild(resultDiv);

                return { success: false, duration, error: error.message };
            }
        }

        function createTestCard(proxyName, apiName, testUrl) {
            const card = document.createElement('div');
            card.className = 'test-card testing';
            card.innerHTML = `
                <div class="test-header">
                    <div class="test-title">${proxyName} → ${apiName}</div>
                    <span class="status-badge status-testing">🔄 Probando...</span>
                </div>
                <div class="test-url">${testUrl.substring(0, 100)}${testUrl.length > 100 ? '...' : ''}</div>
            `;
            return card;
        }

        async function testSingleProxy() {
            const proxyUrl = document.getElementById('proxySelect').value;
            const proxyName = document.getElementById('proxySelect').selectedOptions[0].text;

            document.getElementById('results').innerHTML = '';
            document.getElementById('summary').style.display = 'none';
            testResults = [];

            for (const api of TEST_APIS) {
                const urlWithCache = api.url + (api.url.includes('?') ? '&' : '?') + 'v=' + Date.now();
                const fullUrl = proxyUrl ? proxyUrl + encodeURIComponent(urlWithCache) : urlWithCache;

                const card = createTestCard(proxyName, api.name, fullUrl);
                document.getElementById('results').appendChild(card);

                const result = await testProxy(proxyUrl, api.url, card);
                testResults.push({ proxy: proxyName, api: api.name, ...result });
            }

            showSummary();
        }

        async function testAllProxies() {
            document.getElementById('results').innerHTML = '';
            document.getElementById('summary').style.display = 'none';
            testResults = [];

            for (const proxy of PROXIES) {
                for (const api of TEST_APIS) {
                    const urlWithCache = api.url + (api.url.includes('?') ? '&' : '?') + 'v=' + Date.now();
                    const fullUrl = proxy.url ? proxy.url + encodeURIComponent(urlWithCache) : urlWithCache;

                    const card = createTestCard(proxy.name, api.name, fullUrl);
                    document.getElementById('results').appendChild(card);

                    const result = await testProxy(proxy.url, api.url, card);
                    testResults.push({ proxy: proxy.name, api: api.name, ...result });

                    // Pequeña pausa entre tests para no saturar
                    await new Promise(resolve => setTimeout(resolve, 500));
                }
            }

            showSummary();
        }

        function showSummary() {
            const summary = document.getElementById('summary');
            const content = document.getElementById('summaryContent');

            const successfulTests = testResults.filter(r => r.success);
            const failedTests = testResults.filter(r => !r.success);

            const proxyStats = {};
            testResults.forEach(r => {
                if (!proxyStats[r.proxy]) {
                    proxyStats[r.proxy] = { success: 0, total: 0, avgDuration: 0 };
                }
                proxyStats[r.proxy].total++;
                if (r.success) {
                    proxyStats[r.proxy].success++;
                    proxyStats[r.proxy].avgDuration += r.duration;
                }
            });

            let bestProxy = null;
            let bestScore = -1;

            for (const [proxy, stats] of Object.entries(proxyStats)) {
                if (stats.success > 0) {
                    stats.avgDuration = Math.round(stats.avgDuration / stats.success);
                    const score = stats.success * 1000 - stats.avgDuration;
                    if (score > bestScore) {
                        bestScore = score;
                        bestProxy = { name: proxy, stats };
                    }
                }
            }

            let html = `
                <div class="summary-item">
                    <strong>Tests exitosos:</strong> ${successfulTests.length} / ${testResults.length}
                </div>
            `;

            if (bestProxy) {
                const proxyValue = PROXIES.find(p => p.name === bestProxy.name)?.url || '';
                html += `
                    <div class="summary-item" style="margin-top: 15px;">
                        <strong>🏆 Mejor proxy: ${bestProxy.name}</strong><br>
                        ✅ ${bestProxy.stats.success}/${bestProxy.stats.total} tests exitosos<br>
                        ⏱️ Tiempo promedio: ${bestProxy.stats.avgDuration}ms
                    </div>
                    <div class="summary-item" style="margin-top: 15px;">
                        <strong>💡 Configuración recomendada para app.js:</strong><br>
                        <code>CORS_PROXY: '${proxyValue}'</code>
                    </div>
                `;
            } else {
                html += `
                    <div class="summary-item" style="margin-top: 15px; color: #e74c3c;">
                        <strong>❌ Ningún proxy funcionó</strong><br>
                        Posibles causas:<br>
                        • La API de Renfe está caída<br>
                        • Tu red bloquea proxies externos<br>
                        • Firewall o antivirus interfiriendo
                    </div>
                `;
            }

            content.innerHTML = html;
            summary.style.display = 'block';
        }

        // Auto-test on load
        console.log('🧪 Test de Conexión CORS cargado');
        console.log('Haz clic en "Probar Todos" para diagnosticar la conexión');
    </script>
</body>
</html>
